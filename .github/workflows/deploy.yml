name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      - name: Scrub demo credentials from built assets
        run: |
          set -euo pipefail
          find dist -type f \( -name "*.js" -o -name "*.html" -o -name "*.css" \) -print0 \
            | xargs -0 sed -i \
              -e 's/GEMINI_API_KEY=ai_studio_active_session_token_xyz_9988/GEMINI_API_KEY=DEMO_KEY_REDACTED/g' \
              -e 's#DATABASE_URL=postgresql://sandbox_admin:highly_secure_pass@localhost:5432#DATABASE_URL=postgresql://demo_user:demo_password@localhost:5432#g'

          if grep -R "ai_studio_active_session_token_xyz_9988\|highly_secure_pass" dist; then
            echo "Sensitive demo credentials are still present in built assets. Failing deploy."
            exit 1
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
